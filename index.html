<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0612">
<title>TimeChannel · A Tunnel of Memories</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0a0612; }
  body {
    font-family: Georgia, "Times New Roman", serif;
    color: #f3e9dc;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  #canvas { position: fixed; inset: 0; display: block; cursor: grab; }
  #canvas.dragging { cursor: grabbing; }

  /* ---------- 顶部标题 ---------- */
  #title {
    position: fixed; top: max(20px, env(safe-area-inset-top)); left: 28px;
    pointer-events: none; z-index: 10;
    opacity: 0; animation: fadeIn 2s ease 0.5s forwards;
  }
  #title h1 {
    font-size: 22px; font-weight: 500; letter-spacing: 8px;
    text-shadow: 0 0 24px rgba(255, 200, 160, 0.45);
  }
  #title p {
    font-size: 11px; letter-spacing: 4px; margin-top: 6px;
    color: rgba(243, 233, 220, 0.55);
    font-family: Georgia, serif; font-style: italic;
  }

  /* ---------- 右上按钮 ---------- */
  #toolbar {
    position: fixed; top: max(20px, env(safe-area-inset-top)); right: 20px;
    display: flex; gap: 10px; z-index: 10;
    opacity: 0; animation: fadeIn 2s ease 0.8s forwards;
  }
  .btn {
    appearance: none; border: 1px solid rgba(255, 220, 190, 0.25);
    background: rgba(30, 18, 40, 0.45);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    color: #f3e9dc; font-family: inherit;
    font-size: 13px; letter-spacing: 2px;
    padding: 9px 16px; border-radius: 999px; cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn:hover {
    border-color: rgba(255, 220, 190, 0.7);
    box-shadow: 0 0 18px rgba(255, 200, 160, 0.35);
    background: rgba(50, 30, 60, 0.6);
  }
  .btn.active {
    border-color: rgba(255, 220, 190, 0.9);
    background: rgba(110, 70, 90, 0.55);
    box-shadow: 0 0 22px rgba(255, 190, 150, 0.5);
  }

  /* ---------- 星空色板 ---------- */
  #skyPanel {
    position: fixed; top: calc(max(20px, env(safe-area-inset-top)) + 46px); right: 20px;
    display: flex; gap: 10px; z-index: 10;
    padding: 10px 14px; border-radius: 999px;
    background: rgba(30, 18, 40, 0.55);
    border: 1px solid rgba(255, 220, 190, 0.22);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    opacity: 0; visibility: hidden; transform: translateY(-6px);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
  }
  #skyPanel.open { opacity: 1; visibility: visible; transform: translateY(0); }
  #skyPanel .swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.25);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  #skyPanel .swatch:hover { transform: scale(1.15); }
  #skyPanel .swatch.active {
    box-shadow: 0 0 0 2px rgba(255, 228, 195, 0.85), 0 0 14px rgba(255, 200, 160, 0.5);
  }

  /* ---------- 导入方式菜单 ---------- */
  #uploadPanel {
    position: fixed; top: calc(max(20px, env(safe-area-inset-top)) + 46px); right: 20px;
    display: flex; flex-direction: column; gap: 8px; z-index: 11;
    padding: 12px; border-radius: 14px;
    background: rgba(30, 18, 40, 0.6);
    border: 1px solid rgba(255, 220, 190, 0.22);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    opacity: 0; visibility: hidden; transform: translateY(-6px);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
  }
  #uploadPanel.open { opacity: 1; visibility: visible; transform: translateY(0); }
  #uploadPanel .up-opt {
    appearance: none; border: 1px solid rgba(255, 220, 190, 0.25); border-radius: 999px;
    background: rgba(255, 240, 220, 0.06); color: #f3e9dc; font-family: inherit;
    font-size: 12px; letter-spacing: 1.5px; padding: 8px 14px; cursor: pointer;
    text-align: left; transition: all 0.25s ease;
  }
  #uploadPanel .up-opt:hover {
    border-color: rgba(255, 220, 190, 0.7);
    box-shadow: 0 0 14px rgba(255, 200, 160, 0.3);
  }

  /* ---------- 照片故事面板 ---------- */
  #storyPanel {
    position: fixed; left: 66.5%; top: 50%; /* 紧贴照片右缘 */
    transform: translateY(-50%) translateX(14px);
    width: min(330px, 28vw); max-height: 70vh;
    display: flex; flex-direction: column;
    padding: 18px 18px 14px; border-radius: 16px;
    background: rgba(22, 12, 32, 0.72);
    border: 1px solid rgba(255, 220, 190, 0.22);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    z-index: 20; opacity: 0; visibility: hidden;
    transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
  }
  #storyPanel.open { opacity: 1; visibility: visible; transform: translateY(-50%) translateX(0); }
  #storyPanel .sp-head { font-size: 12px; letter-spacing: 4px; color: rgba(255, 228, 195, 0.7); margin-bottom: 12px; }
  .sp-list {
    overflow-y: auto; flex: 1; position: relative;
    padding-left: 20px; margin-bottom: 12px; min-height: 40px;
    overscroll-behavior: contain; scrollbar-width: thin; /* 像刷评论一样上下滑 */
  }
  .sp-list::-webkit-scrollbar { width: 5px; }
  .sp-list::-webkit-scrollbar-thumb { background: rgba(255, 220, 190, 0.25); border-radius: 3px; }
  .sp-list::before { /* 故事时间轴线，与右侧年代时间轴同款 */
    content: ""; position: absolute; left: 5px; top: 4px; bottom: 4px;
    width: 2px; border-radius: 2px;
    background: linear-gradient(rgba(255, 220, 190, 0.45), rgba(255, 220, 190, 0.1));
  }
  .sp-entry { position: relative; margin-bottom: 14px; }
  .sp-entry .dot {
    position: absolute; left: -18px; top: 4px;
    width: 9px; height: 9px; border-radius: 50%;
    background: #ffe4c3;
    box-shadow: 0 0 10px rgba(255, 200, 160, 0.9);
  }
  .sp-entry .when { font-size: 10px; letter-spacing: 1.5px; color: rgba(255, 228, 195, 0.55); margin-bottom: 3px; }
  .sp-entry .text { font-size: 13px; line-height: 1.55; color: rgba(243, 233, 220, 0.92); white-space: pre-wrap; word-break: break-word; }
  .sp-empty { font-size: 12px; font-style: italic; color: rgba(243, 233, 220, 0.45); letter-spacing: 1px; padding: 6px 0 10px; }
  .sp-input { display: flex; gap: 8px; align-items: flex-end; }
  .sp-input textarea {
    flex: 1; resize: none; font-family: inherit; font-size: 13px; line-height: 1.5;
    color: #f3e9dc; padding: 8px 10px; border-radius: 10px;
    background: rgba(255, 240, 220, 0.07);
    border: 1px solid rgba(255, 220, 190, 0.25);
    outline: none; transition: border-color 0.25s ease;
  }
  .sp-input textarea:focus { border-color: rgba(255, 220, 190, 0.6); }
  .sp-input button {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    border: 1px solid rgba(255, 220, 190, 0.35); background: rgba(110, 70, 90, 0.5);
    color: #ffe4c3; font-size: 18px; line-height: 1; cursor: pointer; font-family: inherit;
    transition: all 0.25s ease;
  }
  .sp-input button:hover { box-shadow: 0 0 14px rgba(255, 200, 160, 0.5); }

  /* ---------- 导入进度提示 ---------- */
  #toast {
    position: fixed; bottom: max(26px, env(safe-area-inset-bottom)); left: 24px;
    z-index: 30; padding: 9px 16px; border-radius: 999px;
    background: rgba(25, 14, 35, 0.78);
    border: 1px solid rgba(255, 220, 190, 0.28);
    font-size: 12px; letter-spacing: 2px; color: #ffe4c3;
    opacity: 0; visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; visibility: visible; }

  /* ---------- 底部提示 ---------- */
  #hint {
    position: fixed; bottom: max(28px, env(safe-area-inset-bottom)); left: 50%;
    transform: translateX(-50%); text-align: center;
    pointer-events: none; z-index: 10;
    font-size: 12px; letter-spacing: 3px;
    color: rgba(243, 233, 220, 0.65);
    text-shadow: 0 0 12px rgba(0,0,0,0.8);
    opacity: 0; animation: fadeIn 2s ease 1.2s forwards;
    transition: opacity 1.2s ease;
    white-space: nowrap;
  }
  #hint.hidden { opacity: 0 !important; }
  #hint .scroll-icon {
    width: 22px; height: 36px; margin: 0 auto 10px;
    border: 1.5px solid rgba(243, 233, 220, 0.5); border-radius: 12px;
    position: relative;
  }
  #hint .scroll-icon::after {
    content: ""; position: absolute; left: 50%; top: 7px;
    width: 3px; height: 7px; border-radius: 2px;
    background: rgba(255, 215, 180, 0.9);
    transform: translateX(-50%);
    animation: scrollDot 1.8s ease-in-out infinite;
  }
  @keyframes scrollDot {
    0%, 100% { top: 7px; opacity: 1; }
    50% { top: 19px; opacity: 0.3; }
  }

  /* ---------- 进度 / 深度指示 ---------- */
  #depth {
    position: fixed; bottom: max(26px, env(safe-area-inset-bottom)); right: 24px;
    z-index: 10; pointer-events: none; text-align: right;
    font-family: Georgia, serif;
    opacity: 0; animation: fadeIn 2s ease 1.5s forwards;
  }
  #depth .num {
    font-size: 20px; letter-spacing: 1px; color: rgba(255, 225, 195, 0.9);
    text-shadow: 0 0 14px rgba(255, 200, 160, 0.4);
  }
  #depth .label { font-size: 10px; letter-spacing: 3px; color: rgba(243,233,220,0.45); margin-top: 2px; }

  /* ---------- 悬停日期提示 ---------- */
  #tip {
    position: fixed; z-index: 15; pointer-events: none;
    padding: 6px 12px; border-radius: 8px;
    background: rgba(25, 14, 35, 0.78);
    border: 1px solid rgba(255, 220, 190, 0.28);
    font-size: 12px; letter-spacing: 2px; color: #ffe4c3;
    opacity: 0; transition: opacity 0.18s ease;
    transform: translate(14px, 10px);
    white-space: nowrap;
  }
  #tip.show { opacity: 1; }

  /* ---------- 聚焦信息栏（取出照片时） ---------- */
  #focusInfo {
    position: fixed; bottom: max(34px, env(safe-area-inset-bottom)); left: 39.5%; /* 对齐左移后的照片中心 */
    transform: translateX(-50%) translateY(12px);
    display: flex; align-items: center; gap: 20px;
    z-index: 20; opacity: 0; visibility: hidden;
    transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
  }
  #focusInfo.open { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
  #focusInfo .meta { text-align: center; }
  #focusInfo .fdate {
    font-size: 19px; letter-spacing: 4px;
    color: rgba(255, 232, 200, 0.95);
    text-shadow: 0 0 18px rgba(255, 200, 160, 0.45);
  }
  #focusInfo .fhint { margin-top: 6px; font-size: 10px; letter-spacing: 3px; color: rgba(243,233,220,0.5); }
  #focusInfo .nav {
    appearance: none; width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(255, 220, 190, 0.3); background: rgba(30, 18, 40, 0.5);
    color: #f3e9dc; font-size: 20px; line-height: 1; cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
  }
  #focusInfo .nav:hover {
    border-color: rgba(255, 220, 190, 0.8);
    box-shadow: 0 0 16px rgba(255, 200, 160, 0.4);
  }

  /* ---------- 时间轴滑条 ---------- */
  #timeline {
    position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
    height: 46vh; z-index: 10; display: flex;
    opacity: 0; animation: fadeIn 2s ease 1.6s forwards;
  }
  #timeline .years { position: relative; width: 38px; pointer-events: none; }
  #timeline .yr {
    position: absolute; right: 8px; transform: translateY(-50%);
    font-size: 10px; letter-spacing: 1px;
    color: rgba(255, 228, 195, 0.55);
  }
  #timeline .track { width: 26px; position: relative; cursor: pointer; touch-action: none; }
  #timeline .track::before {
    content: ""; position: absolute; left: 50%; top: 0; bottom: 0;
    width: 2px; transform: translateX(-50%); border-radius: 2px;
    background: linear-gradient(rgba(255,220,190,0.45), rgba(255,220,190,0.1));
  }
  #timeline .knob {
    position: absolute; left: 50%; top: 0;
    width: 11px; height: 11px; border-radius: 50%;
    transform: translate(-50%, -50%);
    background: #ffe4c3;
    box-shadow: 0 0 12px rgba(255,200,160,0.9), 0 0 26px rgba(255,190,150,0.5);
    pointer-events: none;
  }

  /* ---------- 加载层 ---------- */
  #loader {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #16091f 0%, #0a0612 70%);
    transition: opacity 1.4s ease;
  }
  #loader.done { opacity: 0; pointer-events: none; }
  #loader .ring {
    width: 64px; height: 64px; border-radius: 50%;
    border: 1px solid rgba(255, 215, 180, 0.15);
    border-top-color: rgba(255, 215, 180, 0.85);
    animation: spin 1.2s linear infinite;
    box-shadow: 0 0 30px rgba(255, 190, 150, 0.15), inset 0 0 30px rgba(255, 190, 150, 0.06);
  }
  #loader .text { margin-top: 26px; font-size: 13px; letter-spacing: 6px; color: rgba(243,233,220,0.65); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ---------- 拖入提示 ---------- */
  #dropzone {
    position: fixed; inset: 14px; z-index: 60; border-radius: 18px;
    border: 1.5px dashed rgba(255, 220, 190, 0.7);
    background: rgba(20, 10, 30, 0.55);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; letter-spacing: 6px;
    opacity: 0; pointer-events: none; visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s;
  }
  #dropzone.show { opacity: 1; visibility: visible; }

  @media (max-width: 640px) {
    #title h1 { font-size: 17px; letter-spacing: 6px; }
    #title { left: 18px; }
    .btn { font-size: 12px; padding: 8px 13px; }
    #hint { font-size: 11px; letter-spacing: 2px; }
    #timeline { right: 7px; height: 36vh; }
    #timeline .years { width: 30px; }
    #timeline .yr { font-size: 9px; }
    #focusInfo { gap: 12px; left: 50%; }
    #storyPanel {
      right: 10px !important; left: 10px !important; top: auto; bottom: 96px;
      width: auto; max-height: 30vh;
      transform: translateY(10px);
    }
    #storyPanel.open { transform: translateY(0); }
    .sp-input textarea { font-size: 16px; } /* 防 iOS 聚焦自动放大 */
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="title">
  <h1>TIME CHANNEL</h1>
  <p>drift through your memories · v8</p>
</div>

<div id="toolbar">
  <button class="btn" id="btnUpload">⊕ My Photos</button>
  <button class="btn" id="btnCruise">✦ Auto Cruise</button>
  <button class="btn" id="btnSky">◐ Sky</button>
</div>
<div id="skyPanel">
  <div class="swatch" data-sky="lavender" title="Lavender" style="background: linear-gradient(135deg,#6b4a8c,#b06a78)"></div>
  <div class="swatch" data-sky="rose" title="Rose" style="background: linear-gradient(135deg,#8c3a55,#d98a78)"></div>
  <div class="swatch" data-sky="ocean" title="Ocean" style="background: linear-gradient(135deg,#1e4a7a,#3a9ab0)"></div>
  <div class="swatch" data-sky="aurora" title="Aurora" style="background: linear-gradient(135deg,#1a6a52,#6ab070)"></div>
  <div class="swatch" data-sky="ember" title="Ember" style="background: linear-gradient(135deg,#7a3a16,#d98a3a)"></div>
  <div class="swatch" data-sky="rainbow" title="Rainbow" style="background: conic-gradient(#e66,#ec6,#6c6,#6cc,#66e,#c6c,#e66)"></div>
</div>
<div id="uploadPanel">
  <button class="up-opt" id="optFiles">🖼&nbsp; Photos…</button>
  <button class="up-opt" id="optFolder">📁&nbsp; Folder / Photos Library…</button>
</div>
<input type="file" id="fileInput" accept="image/*,.heic,.heif" multiple hidden>
<input type="file" id="dirInput" webkitdirectory hidden>
<div id="toast"></div>

<div id="hint">
  <div class="scroll-icon"></div>
  scroll / drag / swipe to travel · W S forward / back · A D zoom · click a photo
</div>

<div id="depth">
  <div class="num" id="depthNum">today</div>
  <div class="label" id="depthLabel">into the past</div>
</div>

<div id="tip"></div>

<div id="focusInfo">
  <button class="nav" id="prevBtn" aria-label="previous">‹</button>
  <div class="meta">
    <div class="fdate" id="focusDate"></div>
    <div class="fhint">scroll or ← → to browse · click to return</div>
  </div>
  <button class="nav" id="nextBtn" aria-label="next">›</button>
</div>

<div id="storyPanel">
  <div class="sp-head">S T O R Y</div>
  <div class="sp-list" id="storyList"></div>
  <div class="sp-input">
    <textarea id="storyText" rows="2" placeholder="write the story of this moment…"></textarea>
    <button id="storyAdd" aria-label="add">＋</button>
  </div>
</div>

<div id="timeline">
  <div class="years" id="tlYears"></div>
  <div class="track" id="tlTrack"><div class="knob" id="tlKnob"></div></div>
</div>

<div id="dropzone">drop your photos into time</div>

<div id="loader">
  <div class="ring"></div>
  <div class="text">opening the time tunnel</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ============================================================
   配置
============================================================ */
console.log('%cTimeChannel v8', 'color:#ffe4c3'); // 版本标识：硬刷新（Cmd+Shift+R）后应与标题角标一致
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 640;
const CFG = {
  rings: isMobile ? 26 : 34,        // 同时存在的照片环数
  segments: isMobile ? 10 : 12,     // 每环照片数
  spacing: 9,                       // 环间距
  radius: 14,                       // 隧道半径
  photoW: 6.6, photoH: 4.7,
  photoCount: 48,                   // 默认照片数量
  maxSpeed: 60,
};
const TUNNEL_LEN = CFG.rings * CFG.spacing;

/* ---------- 弯道：隧道沿 z 蜿蜒，穿行更有穿梭感 ---------- */
function curveX(z) { return Math.sin(z * 0.020) * 5.5 + Math.sin(z * 0.0083) * 3.5; }
function curveY(z) { return Math.sin(z * 0.013 + 2.0) * 3.0; }

/* ============================================================
   渲染器 / 场景 / 相机
============================================================ */
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0d0716, 0.0135);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(0, 0, 0);

/* ============================================================
   后期：辉光 + 暗角颗粒
============================================================ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  isMobile ? 0.38 : 0.5,    // strength
  0.55,                      // radius
  0.85                       // threshold
);
composer.addPass(bloom);

const vignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    uTime: { value: 0 },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: /* glsl */`
    uniform sampler2D tDiffuse;
    uniform float uTime;
    varying vec2 vUv;
    float rand(vec2 co){ return fract(sin(dot(co, vec2(12.9898,78.233))) * 43758.5453); }
    void main() {
      vec4 c = texture2D(tDiffuse, vUv);
      vec2 p = vUv - 0.5;
      float vig = smoothstep(0.95, 0.32, length(p) * 1.18);
      c.rgb *= mix(0.55, 1.0, vig);
      // 微微暖色调
      c.rgb = mix(c.rgb, c.rgb * vec3(1.05, 0.99, 0.94), 0.5);
      // 胶片颗粒
      float g = (rand(vUv * (uTime + 1.0)) - 0.5) * 0.045;
      c.rgb += g * (1.0 - vig * 0.6);
      gl_FragColor = c;
    }
  `,
};
const vignettePass = new ShaderPass(vignetteShader);
composer.addPass(vignettePass);
composer.addPass(new OutputPass());

/* ============================================================
   纹理工具：占位画布 + 加载
============================================================ */
const texLoader = new THREE.TextureLoader();
texLoader.setCrossOrigin('anonymous');

const PALETTES = [
  ['#3b2440', '#7b4b6e', '#d9a47f'], ['#21303f', '#4a6b7c', '#cdb38b'],
  ['#402430', '#8c5a62', '#e8c39e'], ['#2a2440', '#5a4b7c', '#b08bbd'],

function placeholderCanvas(i) {
  const cv = document.createElement('canvas');
  cv.width = 480; cv.height = 340;
  const ctx = cv.getContext('2d');
  const pal = PALETTES[i % PALETTES.length];
  const grad = ctx.createLinearGradient(0, 0, 480, 340);
  grad.addColorStop(0, pal[0]); grad.addColorStop(0.55, pal[1]); grad.addColorStop(1, pal[2]);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 480, 340);
  // 柔光圆
  for (let k = 0; k < 6; k++) {
    const x = (Math.sin(i * 7.3 + k * 2.1) * 0.5 + 0.5) * 480;
    const y = (Math.cos(i * 3.7 + k * 1.7) * 0.5 + 0.5) * 340;
    const r = 30 + (k * 37 + i * 13) % 70;
    const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0, 'rgba(255,240,220,0.20)'); rg.addColorStop(1, 'rgba(255,240,220,0)');
    ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,245,230,0.55)';
  ctx.font = 'italic 22px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('memory ' + (i + 1), 240, 180);
  return cv;
}

function makeTexture(source) {
  const t = source instanceof HTMLCanvasElement ? new THREE.CanvasTexture(source) : source;
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return t;
}

// photoItems: { texture, src } — src 用于灯箱大图
let photoItems = [];

function loadDefaultPhotos() {
  return new Promise((resolve) => {
    let done = 0;
    const items = new Array(CFG.photoCount);
    const finish = () => { if (++done === CFG.photoCount) { photoItems = items; resolve(); } };
    for (let i = 0; i < CFG.photoCount; i++) {
      const url = `https://picsum.photos/seed/timechannel${i}/640/452`;
      const fullUrl = `https://picsum.photos/seed/timechannel${i}/1280/904`;
      texLoader.load(
        url,
        (tex) => { items[i] = { texture: makeTexture(tex), src: fullUrl, id: `demo-${i}` }; finish(); },
        undefined,
        () => { // 失败 → 本地渐变占位
          const cv = placeholderCanvas(i);
          items[i] = { texture: makeTexture(cv), src: cv.toDataURL(), id: `demo-${i}` };
          finish();
        }
      );
    }
    // 网络太慢时 6 秒兜底
    setTimeout(() => {
      if (photoItems.length) return;
      for (let i = 0; i < CFG.photoCount; i++) {
        if (!items[i]) {
          const cv = placeholderCanvas(i);
          items[i] = { texture: makeTexture(cv), src: cv.toDataURL(), id: `demo-${i}` };
        }
      }
      photoItems = items; resolve();
    }, 6000);
  });
}

function makeYearSprite() {

  cv.width = 512; cv.height = 224;

function drawYearSign(sprite, year) {
  const cv = sprite.material.map.image;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, 512, 224);

function buildTunnel() {
  for (let r = 0; r < CFG.rings; r++) {
    const group = new THREE.Group();
    group.rotation.z = (r % 2) * (Math.PI / CFG.segments); // 砖缝交错
    const rotSpeed = (Math.random() * 0.4 + 0.6) * 0.028 * (r % 2 === 0 ? 1 : -1); // 相邻环反向，缓缓对转
    const ringCards = [];

    for (let s = 0; s < CFG.segments; s++) {
      const theta = (s / CFG.segments) * Math.PI * 2;
      const card = new THREE.Group();
      card.position.set(Math.cos(theta) * CFG.radius, Math.sin(theta) * CFG.radius, 0);
      card.lookAt(0, 0, 3); // 朝向轴心、微微迎向来路（贴墙，保持隧道感）

      const mesh = new THREE.Mesh(photoGeo, new THREE.MeshBasicMaterial());
      const frame = new THREE.Mesh(frameGeo, frameMat);
      frame.position.z = -0.03;
      card.add(frame);
      card.add(mesh);
      card.userData = {
        theta,
        baseQuat: card.quaternion.clone(),
        phase: Math.random() * Math.PI * 2,
        sway: 0.6 + Math.random() * 0.9,
        photoMesh: mesh,
        frameMesh: frame,
        hover: 0,
      };
      group.add(card);
      ringCards.push(card);
      cards.push(card);
      photoMeshes.push(mesh);
    }

    group.position.z = -r * CFG.spacing; // 卡片朝向算完后再就位
    const sign = makeYearSprite();
    sign.position.set(0, -CFG.radius * 0.62, -r * CFG.spacing); // 挂在隧道下缘，不挡视线
    tunnel.add(sign); // 不随环旋转
    tunnel.add(group);

    const ringObj = { group, rotSpeed, sign, cards: ringCards, year: null, date: null };
    rings.push(ringObj);
    assignRing(ringObj);
  }
}

// 给一个环按时间轴顺序换上下一批照片，并在跨年处立年份路标
function assignRing(ring) {
  let firstDate = null;
  for (const card of ring.cards) {
    const idx = nextPhotoIndex();
    if (!firstDate) firstDate = photoItems[idx].date;
    const mesh = card.userData.photoMesh;
    mesh.userData.photoIndex = idx;
    mesh.material.map = photoItems[idx].texture;
    mesh.material.needsUpdate = true;
  }
  ring.date = firstDate || null;
  ring.year = firstDate ? firstDate.getFullYear() : null;
  if (ring.year !== null && ring.year !== lastSignYear) {
    lastSignYear = ring.year;
    drawYearSign(ring.sign, ring.year);
    ring.sign.visible = true;
  } else {
    ring.sign.visible = false;
  }
}

// 环回收：相机穿过后把环搬到前方（或后方），无限隧道
function recycleRings() {
  const cz = camera.position.z;
  for (const r of rings) {
    // 前进方向是 -z
    while (r.group.position.z > cz + CFG.spacing * 2.5) {
      r.group.position.z -= TUNNEL_LEN;
      assignRing(r);
    }
    while (r.group.position.z < cz - TUNNEL_LEN + CFG.spacing * 2.5) {
      r.group.position.z += TUNNEL_LEN;
      assignRing(r);
    }
  }
}

/* ============================================================
   星云背景（流体感）— 包裹相机的大圆筒，内壁渐变流动
============================================================ */
const nebulaMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: {
    uTime: { value: 0 },
    uColB: { value: new THREE.Color(0.23, 0.10, 0.30) },
    uColC: { value: new THREE.Color(0.42, 0.18, 0.28) },
    uColD: { value: new THREE.Color(0.55, 0.38, 0.22) },
    uRainbow: { value: 0 },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: /* glsl */`
    uniform float uTime;
    uniform vec3 uColB;
    uniform vec3 uColC;
    uniform vec3 uColD;
    uniform float uRainbow;
    varying vec2 vUv;
    vec3 hsv2rgb(vec3 c){
      vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
      vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
      return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }
    // 简易 value noise + fbm
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    float noise(vec2 p){
      vec2 i = floor(p), f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
                 mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
    }
    float fbm(vec2 p){
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 4; i++){ v += a * noise(p); p = p * 2.1 + 17.0; a *= 0.5; }
      return v;
    }
    void main(){
      vec2 p = vec2(vUv.x * 6.2831, vUv.y * 4.0);
      float t = uTime * 0.05;
      // 双层流动 → 流体感
      float n1 = fbm(p * 1.4 + vec2(t * 0.7, -t));
      float n2 = fbm(p * 2.3 - vec2(t, t * 0.4) + n1 * 1.8);
      vec3 deep = vec3(0.05, 0.03, 0.09);
      vec3 colB = uColB, colC = uColC, colD = uColD;
      if (uRainbow > 0.01) { // 彩虹：色相沿筒壁与时间流动
        float hue = fract(vUv.x + uTime * 0.018 + n1 * 0.25);
        colB = mix(colB, hsv2rgb(vec3(hue, 0.75, 0.30)), uRainbow);
        colC = mix(colC, hsv2rgb(vec3(fract(hue + 0.18), 0.70, 0.45)), uRainbow);
        colD = mix(colD, hsv2rgb(vec3(fract(hue + 0.40), 0.65, 0.55)), uRainbow);
      }
      vec3 col = mix(deep, colB, smoothstep(0.25, 0.75, n1));
      col = mix(col, colC, smoothstep(0.5, 0.95, n2) * 0.7);
      col += colD * pow(max(n2 - 0.62, 0.0), 2.0) * 2.2;
      gl_FragColor = vec4(col * 0.5, 1.0);
    }
  `,
});
const nebula = new THREE.Mesh(new THREE.CylinderGeometry(58, 58, 360, 40, 1, true), nebulaMat);

function makeParticles(count, tex, size, opacity, spread) {
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const rr = Math.random() * spread;
    const z = -Math.random() * TUNNEL_LEN;

    pos[i * 3 + 1] = Math.sin(a) * rr + curveY(z);

  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    map: tex, size, transparent: true, opacity,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  return pts;
}

function driftParticles(pts, dt, t, wobble, spread) {
  const arr = pts.geometry.attributes.position.array;
  const cz = camera.position.z;
  for (let i = 0; i < arr.length; i += 3) {
    arr[i] += Math.sin(t * 0.6 + i) * wobble * dt;
    arr[i + 1] += Math.cos(t * 0.5 + i * 1.3) * wobble * dt + dt * 0.25; // 缓缓上浮
    // 沿 z 回收，并围绕弯道中心重新散布
    let wrapped = false;
    if (arr[i + 2] > cz + 6) { arr[i + 2] -= TUNNEL_LEN; wrapped = true; }
    if (arr[i + 2] < cz - TUNNEL_LEN + 6) { arr[i + 2] += TUNNEL_LEN; wrapped = true; }
    if (wrapped) {
      const a = Math.random() * Math.PI * 2, rr = Math.random() * spread;
      arr[i] = curveX(arr[i + 2]) + Math.cos(a) * rr;
      arr[i + 1] = curveY(arr[i + 2]) + Math.sin(a) * rr;
    }
    if (arr[i + 1] > curveY(arr[i + 2]) + CFG.radius) arr[i + 1] = curveY(arr[i + 2]) - CFG.radius * 0.6;
  }
  pts.geometry.attributes.position.needsUpdate = true;
}

const meteors = [];
{

function spawnMeteor() {
  const m = meteors.find((x) => !x.group.visible);
  if (!m) return;
  const cz = camera.position.z;
  const side = Math.random() < 0.5 ? -1 : 1;
  let dir;
  if (Math.random() < 0.55) {
    // 深空型：在隧道尽头的黑洞星空里缓缓划过
    const mz = cz - (130 + Math.random() * 90);
    m.group.position.set(
      curveX(mz) + side * (12 + Math.random() * 20),
      curveY(mz) - 8 + Math.random() * 28,
      mz
    );
    dir = new THREE.Vector3(
      -side * (0.7 + Math.random() * 0.5),
      -(0.15 + Math.random() * 0.5),
      (Math.random() - 0.5) * 0.4
    ).normalize();
    m.vel.copy(dir).multiplyScalar(40 + Math.random() * 40);
    m.maxLife = 1.6 + Math.random() * 1.0;
  } else {
    // 隧道外型：从照片缝隙间瞥见
    const mz = cz - (45 + Math.random() * 140);
    m.group.position.set(
      curveX(mz) + side * (20 + Math.random() * 26),
      curveY(mz) + 16 + Math.random() * 24,
      mz
    );
    dir = new THREE.Vector3(
      -side * (0.5 + Math.random() * 0.7),
      -(0.45 + Math.random() * 0.55),
      (Math.random() - 0.35) * 0.7
    ).normalize();
    m.vel.copy(dir).multiplyScalar(55 + Math.random() * 60);
    m.maxLife = 1.1 + Math.random() * 1.1;
  }
  m.group.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), dir);
  m.life = 0;
  m.group.visible = true;
}

function updateMeteors(dt, t) {
  if (t > nextMeteorAt) {
    spawnMeteor();
    if (Math.random() < 0.3) spawnMeteor(); // 偶尔成对划过
    nextMeteorAt = t + 2.5 + Math.random() * 5.5;
  }
  for (const m of meteors) {
    if (!m.group.visible) continue;
    m.life += dt;
    if (m.life >= m.maxLife) { m.group.visible = false; m.mat.opacity = 0; continue; }
    m.group.position.addScaledVector(m.vel, dt);
    m.mat.opacity = Math.pow(Math.sin(Math.PI * (m.life / m.maxLife)), 0.7);
  }
}

window.addEventListener('wheel', (e) => {
  if (e.target && e.target.closest && e.target.closest('#storyPanel')) return; // 故事面板内滚动列表
  if (focused) { // 聚焦时滚轮翻页
    wheelAcc += e.deltaY;
    const now = performance.now();
    if (Math.abs(wheelAcc) > 80 && now - lastPageTime > 280) {
      pageFocus(wheelAcc > 0 ? 1 : -1);
      wheelAcc = 0; lastPageTime = now;
    }
    return;
  }
  goalZ = null;
  velocity += e.deltaY * 0.014;
  velocity = THREE.MathUtils.clamp(velocity, -CFG.maxSpeed, CFG.maxSpeed);
  markInteracted();
}, { passive: true });

let dragStartX = 0;
canvas.addEventListener('pointerdown', (e) => {
  dragging = true; dragMoved = 0;
  lastPointerY = e.clientY; lastPointerX = e.clientX;
  dragStartX = e.clientX;
  canvas.classList.add('dragging');
  try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
});
canvas.addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -((e.clientY / window.innerHeight) * 2 - 1);
  pointerActive = true;
  tipX = e.clientX; tipY = e.clientY;
  if (dragging && !focused) {
    const dy = e.clientY - lastPointerY;
    dragMoved += Math.abs(dy) + Math.abs(e.clientX - lastPointerX);
    velocity += dy * (isMobile ? 0.10 : 0.055);
    velocity = THREE.MathUtils.clamp(velocity, -CFG.maxSpeed, CFG.maxSpeed);
    lastPointerY = e.clientY; lastPointerX = e.clientX;
    goalZ = null;
    markInteracted();
  } else if (dragging) {
    dragMoved += Math.abs(e.clientY - lastPointerY) + Math.abs(e.clientX - lastPointerX);
    lastPointerY = e.clientY; lastPointerX = e.clientX;
  }
});
canvas.addEventListener('pointerup', (e) => {
  dragging = false;
  canvas.classList.remove('dragging');
  if (focused) {
    const dx = e.clientX - dragStartX;
    if (Math.abs(dx) > 60) pageFocus(dx < 0 ? 1 : -1); // 左右滑动翻页
    else if (dragMoved < 6) closeFocus();              // 轻点返回
    return;
  }
  if (dragMoved < 6) handleTap(e); // 视为点击
});
canvas.addEventListener('pointercancel', () => { dragging = false; canvas.classList.remove('dragging'); });

const keys = {};
window.addEventListener('keydown', (e) => {
  if (e.target && (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT')) return; // 输入框优先
  if (focused) {
    if (e.key === 'ArrowLeft') pageFocus(-1);
    else if (e.key === 'ArrowRight') pageFocus(1);
    else if (['Escape', ' ', 'ArrowUp', 'ArrowDown'].includes(e.key)) closeFocus();

  keys[e.key] = true;
  keys[e.code] = true; // e.code 不受输入法/大小写影响（中文 IME 下 e.key 是 'Process'）
  if (e.key === ' ') { cruise = !cruise; updateCruiseBtn(); goalZ = null; }

const raycaster = new THREE.Raycaster();
const _ndc = new THREE.Vector2();
const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _v3 = new THREE.Vector3();
const _q1 = new THREE.Quaternion();
const REACH = 60;         // 可悬停/点击的最远距离

const tip = document.getElementById('tip');

const focusDate = document.getElementById('focusDate');
const frameHoverMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(1.5, 1.28, 1.0) });

let hoveredCard = null;
let pointerActive = false;
let tipX = 0, tipY = 0;
let focused = null;       // { card, idx }
let focusClosing = false;
let focusT = 0;

function setHovered(card) {
  if (card === hoveredCard) return;
  if (hoveredCard) hoveredCard.userData.frameMesh.material = frameMat;
  hoveredCard = card;
  if (hoveredCard) {

function openFocus(mesh) {

let hiCurrent = null; // 单槽高清缓存：看哪张加载哪张，换张即释放显存
function disposeHiRes() {
  if (!hiCurrent) return;
  hiCurrent.tex.dispose();
  if (hiCurrent.temp && hiCurrent.url) URL.revokeObjectURL(hiCurrent.url);
  hiCurrent = null;
}

async function loadHiRes(item, idx, mesh) {
  let url = item.src, temp = false;
  if (!url && item.file) { // Chrome 的 HEIC：看大图时按需转码
    try {
      const heic2any = await loadHeic2any();
      const blob = await heic2any({ blob: item.file, toType: 'image/jpeg', quality: 0.92 });
      url = URL.createObjectURL(blob); temp = true;
    } catch (_) { return; }
  }
  if (!url) return;
  texLoader.load(url, (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    if (focused && focused.idx === idx) {
      disposeHiRes();
      hiCurrent = { tex, url, temp };
      mesh.material.map = tex;
      mesh.material.needsUpdate = true;
    } else { // 已经翻页/关闭，直接丢弃
      tex.dispose();
      if (temp) URL.revokeObjectURL(url);
    }
  });
}

function showFocusedPhoto(idx) {
  if (!focused) return;
  focused.idx = idx;
  const item = photoItems[idx];
  const mesh = focused.card.userData.photoMesh;
  mesh.material.map = item.texture;
  mesh.material.toneMapped = false; // 原图原色，不被影调压灰
  mesh.material.needsUpdate = true;
  focusDate.textContent = item.date ? fmtDate(item.date) : '';
  renderStories(idx);
  loadHiRes(item, idx, mesh);
}

function pageFocus(dir) {
  if (!focused) return;
  showFocusedPhoto((focused.idx + dir + photoItems.length) % photoItems.length);
}

function closeFocus() {
  if (!focused || focusClosing) return;
  focusClosing = true;
  focusInfo.classList.remove('open');
  storyPanel.classList.remove('open');
}

function finalizeFocusClose() {
  if (!focused) return;
  const mesh = focused.card.userData.photoMesh;
  mesh.material.map = photoItems[mesh.userData.photoIndex].texture;
  mesh.material.toneMapped = true;
  mesh.material.needsUpdate = true;
  focused.card.userData.frameMesh.visible = true;
  focused.card.scale.setScalar(1);
  disposeHiRes();
  focused = null; focusClosing = false; focusT = 0;
}

function fmtWhen(ts) {
  const d = new Date(ts);
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${fmtDate(d)} · ${hh}:${mm}`;
}

function renderStories(idx) {
  const id = photoItems[idx]?.id;
  storyList.innerHTML = '';
  const list = (id && stories[id]) ? [...stories[id]].sort((a, b) => a.t - b.t) : [];
  if (!list.length) {
    const empty = document.createElement('div');
    empty.className = 'sp-empty';
    empty.textContent = 'no story yet — write the first line';
    storyList.appendChild(empty);

    const dot = document.createElement('div'); dot.className = 'dot';
    const when = document.createElement('div'); when.className = 'when'; when.textContent = fmtWhen(s.t);
    const tx = document.createElement('div'); tx.className = 'text'; tx.textContent = s.text;
    en.append(dot, when, tx);

function submitStory() {
  if (!focused) return;

  const id = photoItems[focused.idx]?.id;

  (stories[id] ??= []).push({ t: Date.now(), text });

function handleTap(e) {
  if (focused) { closeFocus(); return; }
  raycaster.setFromCamera(_ndc.set(
    (e.clientX / window.innerWidth) * 2 - 1,
    -((e.clientY / window.innerHeight) * 2 - 1)
  ), camera);
  const hits = raycaster.intersectObjects(photoMeshes, false);
  if (hits.length && hits[0].distance < REACH) openFocus(hits[0].object);
}

/* ---------- 导入：JPG/PNG/WebP/GIF + Apple HEIC/HEIF，读取 EXIF 拍摄时间 ---------- */
const toast = document.getElementById('toast');
let toastTimer = null;
function showToast(text, sticky = false) {
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  if (!sticky) toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}
let exifrPromise = null; // 按需加载 EXIF 解析库
function loadExifr() {
  exifrPromise ??= loadScript('https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js').then(() => window.exifr);
  return exifrPromise;
}
let heicPromise = null; // 按需加载 HEIC 转码库
function loadHeic2any() {
  heicPromise ??= loadScript('https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js').then(() => window.heic2any);
  return heicPromise;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = url;
  });
}

const IS_HEIC = (f) => /\.(heic|heif)$/i.test(f.name) || /hei[cf]/i.test(f.type);

const THUMB_DIM = 512; // 隧道纹理统一降采样：千张级图库也撑得住显存

function downscaleToCanvas(img, maxDim) {
  const k = Math.min(1, maxDim / Math.max(img.width || 1, img.height || 1));
  const cv = document.createElement('canvas');
  cv.width = Math.max(1, Math.round((img.width || 1) * k));
  cv.height = Math.max(1, Math.round((img.height || 1) * k));
  cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
  return cv;
}

async function importOne(file) {
  // 拍摄时间：优先 EXIF（含 HEIC），退回文件修改时间
  let date = null;
  try {
    const exifr = await loadExifr();
    const meta = await exifr.parse(file, ['DateTimeOriginal', 'CreateDate']);
    date = meta?.DateTimeOriginal || meta?.CreateDate || null;
  } catch (_) {}
  const url = URL.createObjectURL(file);
  let img, converted = false;
  try {
    img = await loadImage(url); // Safari 可原生解码 HEIC
  } catch (err) {
    if (!IS_HEIC(file)) { URL.revokeObjectURL(url); throw err; }
    const heic2any = await loadHeic2any(); // Chrome 等：转码为 JPEG
    const blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.9 });
    const curl = URL.createObjectURL(blob);
    try { img = await loadImage(curl); } finally { URL.revokeObjectURL(curl); }
    converted = true;
  }
  const thumb = downscaleToCanvas(img, THUMB_DIM);
  if (converted) URL.revokeObjectURL(url); // 转码图不留内存；看大图时持 file 引用再转
  return {
    texture: makeTexture(thumb),
    src: converted ? null : url,    // 原图懒加载入口（文件支撑，不占内存）
    file: converted ? file : null,  // HEIC 原文件引用，按需重转
    date: date || new Date(file.lastModified || Date.now()),
    id: `${file.name}|${file.size}|${file.lastModified}`, // 稳定标识，故事跨会话保留
  };
}

/* ---------- 文件夹 / Mac 照片图库（.photoslibrary）导入 ---------- */
async function walkEntry(entry, out) {
  if (entry.isFile) {
    const f = await new Promise((res, rej) => entry.file(res, rej));
    f._path = entry.fullPath;
    out.push(f);
  } else if (entry.isDirectory) {
    const reader = entry.createReader();
    while (true) { // readEntries 分批返回
      const batch = await new Promise((res, rej) => reader.readEntries(res, rej));
      if (!batch.length) break;
      await Promise.all(batch.map((e) => walkEntry(e, out)));
    }
  }
}

async function collectDropFiles(dt) {
  const out = [];
  // 必须在事件回调内同步取 entry，之后才能 await
  const entries = [...dt.items].map((it) => it.webkitGetAsEntry?.()).filter(Boolean);
  if (entries.length) await Promise.all(entries.map((en) => walkEntry(en, out)));
  else out.push(...dt.files);
  return out;
}

const MAX_LIBRARY_IMPORT = 1200; // 512px 缩略图下千张级仍流畅；超出取最新的
function pickLibraryPhotos(files) {
  const getPath = (f) => (f.webkitRelativePath || f._path || f.name).toLowerCase();
  let imgs = files.filter((f) => f.type.startsWith('image/') || IS_HEIC(f));
  // Photos Library：只取原图，跳过缩略图/衍生图
  const originals = imgs.filter((f) => /\/(originals|masters)\//.test(getPath(f)));
  if (originals.length) imgs = originals;
  else imgs = imgs.filter((f) => !/\/(derivatives|thumbnails|previews|resources)\//.test(getPath(f)));
  if (imgs.length > MAX_LIBRARY_IMPORT) {
    imgs.sort((a, b) => b.lastModified - a.lastModified);
    imgs = imgs.slice(0, MAX_LIBRARY_IMPORT);
    showToast(`large library — importing the latest ${MAX_LIBRARY_IMPORT} photos`, true);
  }
  return imgs;
}

async function addUserPhotos(fileList) {
  const files = [...fileList].filter((f) => f.type.startsWith('image/') || IS_HEIC(f));
  if (!files.length) return;
  const newItems = [];
  let failed = 0, done = 0, nextIdx = 0;
  const CONC = 3; // 并发解码/转码，大图库提速
  await Promise.all(Array.from({ length: Math.min(CONC, files.length) }, async () => {
    while (nextIdx < files.length) {
      const i = nextIdx++;
      try { newItems.push(await importOne(files[i])); }
      catch (err) { failed++; console.warn('import failed:', files[i].name, err); }
      done++;
      showToast(`importing ${done} / ${files.length}…`, true);
    }
  }));
  if (newItems.length) {
    applyUserPhotos(newItems);
    showToast(`${newItems.length} photo${newItems.length > 1 ? 's' : ''} in the tunnel, sorted by time${failed ? ` · ${failed} failed` : ''}`);
  } else {
    showToast(failed ? `all ${failed} files failed — see console` : 'no photos could be imported');
  }
}

let userAlbum = []; // 多次导入累积
function applyUserPhotos(newItems) {
  // 按时间排序（新→旧）：入口是现在，越深处越久远
  userAlbum = userAlbum.concat(newItems);
  userAlbum.sort((a, b) => b.date - a.date);
  photoItems = userAlbum;
  globalPhotoCursor = 0;
  lastSignYear = null;
  for (const r of rings) assignRing(r);
  btnUpload.textContent = `⊕ My Photos · ${userAlbum.length}`;
  if (focused) { focusInfo.classList.remove('open'); storyPanel.classList.remove('open'); finalizeFocusClose(); }
  rebuildTimeline();
}

/* ============================================================
   时间轴滑条：拖到某一年
============================================================ */
const tlTrack = document.getElementById('tlTrack');
const tlKnob = document.getElementById('tlKnob');
const tlYears = document.getElementById('tlYears');
let tlSpanMs = 0, tlNewestMs = 0, cycleLen = 1;
let tlActive = false;
let goalZ = null; // 时间轴寻路目标

function rebuildTimeline() {
  tlNewestMs = photoItems[0].date.getTime();
  const oldest = photoItems[photoItems.length - 1].date.getTime();
  tlSpanMs = Math.max(tlNewestMs - oldest, 86400000);
  cycleLen = (photoItems.length / CFG.segments) * CFG.spacing; // 相册铺满一轮的隧道长度
  tlYears.innerHTML = '';
  const seen = new Set();
  for (const item of photoItems) {
    const y = item.date.getFullYear();
    if (seen.has(y)) continue;
    seen.add(y);
    const el = document.createElement('div');
    el.className = 'yr';
    el.textContent = y;
    el.style.top = ((tlNewestMs - item.date.getTime()) / tlSpanMs * 100) + '%';
    tlYears.appendChild(el);
  }
}

function seekToFraction(f) {
  if (!tlSpanMs) return;
  if (focused) closeFocus();
  cruise = false; updateCruiseBtn();
  // 落到当前所在轮次中对应年代的位置（相册循环铺设）
  const depthInCycle = f * cycleLen;
  const k = Math.max(0, Math.round((-camera.position.z - depthInCycle) / cycleLen));
  goalZ = -(k * cycleLen + depthInCycle);
  tlKnob.style.top = (f * 100) + '%';
  markInteracted();
}

function tlFraction(e) {
  const r = tlTrack.getBoundingClientRect();
  return THREE.MathUtils.clamp((e.clientY - r.top) / r.height, 0, 1);
}
tlTrack.addEventListener('pointerdown', (e) => {
  tlActive = true;
  try { tlTrack.setPointerCapture(e.pointerId); } catch (_) {}
  seekToFraction(tlFraction(e));
});
tlTrack.addEventListener('pointermove', (e) => { if (tlActive) seekToFraction(tlFraction(e)); });
tlTrack.addEventListener('pointerup', () => { tlActive = false; });
tlTrack.addEventListener('pointercancel', () => { tlActive = false; });

   主循环
============================================================ */
const depthNum = document.getElementById('depthNum');
const depthLabel = document.getElementById('depthLabel');
const clock = new THREE.Clock();
let traveled = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 键盘：W/S 前进后退，A/D 视角缩放（e.code 兜底，输入法无关）
  if (keys['ArrowUp'] || keys['w'] || keys['W'] || keys['KeyW']) { velocity += 38 * dt; goalZ = null; }
  if (keys['ArrowDown'] || keys['s'] || keys['S'] || keys['KeyS']) { velocity -= 38 * dt; goalZ = null; }
  if (keys['a'] || keys['A'] || keys['KeyA']) zoomFov = Math.max(zoomFov - 55 * dt, -30); // 拉近
  if (keys['d'] || keys['D'] || keys['KeyD']) zoomFov = Math.min(zoomFov + 55 * dt, 22);  // 拉远

  // 自动漫游：缓缓向前
  if (cruise && !focused) velocity = THREE.MathUtils.lerp(velocity, 7.5, dt * 0.8);

  // 时间轴寻路：向目标年代飞行
  if (goalZ !== null && !focused) {
    const dzG = camera.position.z - goalZ;
    velocity = THREE.MathUtils.clamp(dzG * 1.6, -CFG.maxSpeed * 1.3, CFG.maxSpeed * 1.3);
    if (Math.abs(dzG) < 0.5) { goalZ = null; velocity = 0; }
  }

  // 聚焦时刹停
  if (focused) velocity *= Math.pow(0.0001, dt);

  // 阻尼
  velocity *= Math.pow(0.32, dt);
  if (Math.abs(velocity) < 0.01 && !cruise) velocity = 0;

  // 前进 = -z
  camera.position.z -= velocity * dt;
  traveled = -camera.position.z;

  // 视差 + 呼吸感 + 沿弯道行进
  lensX = THREE.MathUtils.lerp(lensX, pointer.x * 1.6, dt * 2.2);
  lensY = THREE.MathUtils.lerp(lensY, pointer.y * 1.1, dt * 2.2);
  const cz0 = camera.position.z;
  const bendX = curveX(cz0), bendY = curveY(cz0);
  camera.position.x = bendX + lensX + Math.sin(t * 0.4) * 0.25;
  camera.position.y = bendY + lensY + Math.cos(t * 0.31) * 0.2;
  camera.lookAt(
    curveX(cz0 - 26) + lensX * 0.5,
    curveY(cz0 - 26) + lensY * 0.5,
    cz0 - 26
  );
  camera.rotateZ(Math.sin(t * 0.2) * 0.015 - lensX * 0.012 + (bendX - curveX(cz0 - 9)) * 0.05); // 入弯轻微侧倾

  // 速度感 + 用户缩放：FOV 调整
  const targetFov = 72 + Math.min(Math.abs(velocity), 40) * 0.28 + zoomFov;
  camera.fov = THREE.MathUtils.lerp(camera.fov, targetFov, dt * 3);
  camera.updateProjectionMatrix();

  // 环旋转 + 弯道偏移 + 回收
  for (const r of rings) {
    r.group.rotation.z += r.rotSpeed * dt * (1 + Math.abs(velocity) * 0.04);
    const gz = r.group.position.z;
    r.group.position.x = curveX(gz);
    r.group.position.y = curveY(gz);
    r.sign.position.set(curveX(gz), curveY(gz) - CFG.radius * 0.62, gz);
  }
  recycleRings();

  // 聚焦进度（0→1 取出，1→0 放回）
  const focusTarget = (focused && !focusClosing) ? 1 : 0;
  focusT += (focusTarget - focusT) * Math.min(dt * 4.5, 1);
  if (focusClosing && focusT < 0.02) finalizeFocusClose();
  const focusEase = focusT * focusT * (3 - 2 * focusT);
  // 看原图时压低辉光，白色照片不再泛白发雾
  bloom.strength = (isMobile ? 0.38 : 0.5) * (1 - 0.92 * focusEase);
  // 取出距离随视口自适应；桌面端照片靠左给故事面板留位，移动端上移
  const tanHalfFov = Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2);
  const fW = isMobile ? 0.84 : 0.52, fH = isMobile ? 0.50 : 0.66;
  const focusDist = Math.max(
    (CFG.photoH * 1.55 * 0.5) / (fH * tanHalfFov),
    (CFG.photoW * 1.55 * 0.5) / (fW * tanHalfFov * camera.aspect)
  );

  // 悬停检测（桌面端）
  if (!isMobile && pointerActive && !dragging && !focused) {
    raycaster.setFromCamera(_ndc.set(pointer.x, pointer.y), camera);
    const hits = raycaster.intersectObjects(photoMeshes, false);
    setHovered(hits.length && hits[0].distance < REACH ? hits[0].object.parent : null);
  } else if (hoveredCard) {
    setHovered(null);
  }
  if (hoveredCard) { tip.style.left = tipX + 'px'; tip.style.top = tipY + 'px'; }

  // 照片漂浮 + 悬停浮出 + 聚焦飞到镜头前
  for (const card of cards) {
    const u = card.userData;
    const rr = CFG.radius + Math.sin(t * 0.35 * u.sway + u.phase * 1.7) * 0.12;
    let px = Math.cos(u.theta) * rr;
    let py = Math.sin(u.theta) * rr;
    const pz = Math.sin(t * 0.5 * u.sway + u.phase) * 0.22;
    u.hover += (((hoveredCard === card) ? 1 : 0) - u.hover) * Math.min(dt * 7, 1);
    let scale = 1 + 0.07 * u.hover;
    if (u.hover > 0.001) {
      px -= Math.cos(u.theta) * 0.9 * u.hover; // 向隧道中心浮出
      py -= Math.sin(u.theta) * 0.9 * u.hover;
    }
    card.position.set(px, py, pz);
    card.quaternion.copy(u.baseQuat);
    card.rotateZ(Math.sin(t * 0.4 * u.sway + u.phase) * 0.018);
    if (focused && focused.card === card && focusEase > 0.0001) {
      _v2.set(0, 0, -1).applyQuaternion(camera.quaternion);
      _v1.copy(camera.position).addScaledVector(_v2, focusDist);
      if (!isMobile) { // 桌面：照片靠左，右侧留给故事面板
        _v3.set(1, 0, 0).applyQuaternion(camera.quaternion);
        _v1.addScaledVector(_v3, -focusDist * tanHalfFov * camera.aspect * 0.21);
      } else { // 移动端：照片上移，底部留给故事面板
        _v3.set(0, 1, 0).applyQuaternion(camera.quaternion);
        _v1.addScaledVector(_v3, focusDist * tanHalfFov * 0.16);
      }
      _v1.y += Math.sin(t * 0.8) * 0.07; // 取出后轻轻呼吸
      card.parent.worldToLocal(_v1);
      card.position.lerp(_v1, focusEase);
      card.parent.getWorldQuaternion(_q1).invert().multiply(camera.quaternion);
      card.quaternion.slerp(_q1, focusEase);
      // 按原图宽高比显示（隧道里仍是统一尺寸）
      let fsx = 1, fsy = 1;
      const im = u.photoMesh.material.map && u.photoMesh.material.map.image;
      if (im && im.width && im.height) {
        const imgA = im.width / im.height, cardA = CFG.photoW / CFG.photoH;
        if (imgA > cardA) fsy = cardA / imgA; else fsx = imgA / cardA;
      }
      u.frameMesh.visible = focusEase < 0.35; // 取出时收起发光相框
      card.scale.set(
        scale * (1 - focusEase) + 1.55 * fsx * focusEase,
        scale * (1 - focusEase) + 1.55 * fsy * focusEase,
        scale * (1 - focusEase) + 1.55 * focusEase
      );
      continue;
    }
    card.scale.setScalar(scale);
  }

  // 聚焦暗幕：压暗背后的隧道
  if (focusT > 0.002) {
    focusDim.visible = true;
    _v2.set(0, 0, -1).applyQuaternion(camera.quaternion);
    focusDim.position.copy(camera.position).addScaledVector(_v2, focusDist + 1.6);
    focusDim.quaternion.copy(camera.quaternion);
    focusDim.material.opacity = 0.55 * focusEase;
  } else {
    focusDim.visible = false;
  }

  // 年份路标：只点亮迎面最近的一块，避免文字重叠
  let nearestSign = null, nearestDz = Infinity;
  for (const r of rings) {
    if (!r.sign.visible) continue;
    const dz = camera.position.z - r.group.position.z;
    if (dz > 4 && dz < 130 && dz < nearestDz) { nearestDz = dz; nearestSign = r.sign; }
  }
  for (const r of rings) {
    if (!r.sign.visible) continue;
    let target = 0;
    if (r.sign === nearestSign) {
      target = Math.min((nearestDz - 4) / 14, 1) * Math.min((130 - nearestDz) / 40, 1) * 0.8;
    }
    r.sign.material.opacity += (target - r.sign.material.opacity) * Math.min(dt * 4, 1);
  }

  // 背景与尽头光跟随相机（沿弯道）
  nebula.position.set(bendX * 0.8, bendY * 0.8, camera.position.z - 60);
  nebulaMat.uniforms.uTime.value = t;
  // 星空配色平滑过渡
  const rbU = nebulaMat.uniforms.uRainbow;
  rbU.value += ((skyName === 'rainbow' ? 1 : 0) - rbU.value) * Math.min(dt * 2, 1);
  nebulaMat.uniforms.uColB.value.lerp(skyTarget[0], Math.min(dt * 2, 1));
  nebulaMat.uniforms.uColC.value.lerp(skyTarget[1], Math.min(dt * 2, 1));
  nebulaMat.uniforms.uColD.value.lerp(skyTarget[2], Math.min(dt * 2, 1));
  endGlow.position.set(curveX(cz0 - 150), curveY(cz0 - 150), cz0 - 150);

  // 粒子 / 星空 / 流星
  driftParticles(dust, dt, t, 0.35, CFG.radius * 0.85);
  recycleStars(stars);
  stars.material.opacity = 0.75 + Math.sin(t * 0.6) * 0.18;
  updateMeteors(dt, t);

  // HUD：深度换算成时间刻度（按前后两环的日期插值）
  const czHud = camera.position.z;
  let behindR = null, aheadR = null;
  for (const r of rings) {
    if (!r.date) continue;
    const z = r.group.position.z;
    if (z >= czHud) { if (!behindR || z < behindR.group.position.z) behindR = r; }
    else if (!aheadR || z > aheadR.group.position.z) aheadR = r;
  }
  if (behindR || aheadR) {
    const now = Date.now();
    const dA = behindR ? now - behindR.date.getTime() : 0;
    const dB = aheadR ? now - aheadR.date.getTime() : dA;
    let f = 1;
    if (behindR && aheadR) {
      const zb = behindR.group.position.z, za = aheadR.group.position.z;
      f = THREE.MathUtils.clamp((zb - czHud) / Math.max(zb - za, 1e-6), 0, 1);
    }
    const ms = dA + (dB - dA) * f;
    const days = Math.max(0, Math.round(ms / 86400000));
    depthNum.textContent = days === 0 ? 'today' : days.toLocaleString('en-US') + ' days ago';
    depthLabel.textContent = '· ' + new Date(now - ms).getFullYear() + ' ·';
    if (!tlActive && tlSpanMs) {
      tlKnob.style.top = THREE.MathUtils.clamp(ms / tlSpanMs, 0, 1) * 100 + '%';
    }
  }

  vignettePass.uniforms.uTime.value = t % 10;
  composer.render();
}

/* ============================================================
   启动
============================================================ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

loadDefaultPhotos().then(() => {
  attachDemoDates();
  rebuildTimeline();
  buildTunnel();
  animate();
  document.getElementById('loader').classList.add('done');
});
</script>
</body>
</html>
